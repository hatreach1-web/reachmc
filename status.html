<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ReachMC | Status</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- MASTER NAVBAR -->
        <nav class="navbar">
        <a href="/" class="logo">REACH<span>MC</span></a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="features">Features</a>
            <a href="join">Join</a>
            <a href="status">Status</a>
            <a href="store">Store</a>
            <a href="discord">Discord</a>
        </div>
    </nav>

    <section class="discord-container">
        <h2 class="page-title">Live <span style="color:#a020f0">Status</span></h2>
        
        <div class="discord-card" style="padding: 50px;">
            <h3 style="margin-bottom: 20px; font-size: 1.8rem; letter-spacing: 1px;">play.reachmc.fun</h3>
            
            <!-- This is where the JS injects the green dot and ONLINE text -->
            <div class="status-box" style="transform: scale(1.5); margin: 30px auto; border: 1px solid rgba(160, 32, 240, 0.5);">
                <div class="status-dot" id="status-dot-page"></div>
                <span id="server-status-page">Checking Server...</span>
            </div>
            
            <!-- This is where the JS injects the Player Count -->
            <p id="player-count-page" style="font-size: 1.4rem; font-weight: 800; margin-top: 30px; color: #00ff88;"></p>
            
            <p style="color: #888; margin-top: 20px; font-size: 0.9rem;">Bedrock / Java Port: 25574</p>
            
            <button onclick="copyIP()" class="btn-buy" style="margin-top: 25px; border: none; cursor: pointer;">COPY IP</button>
        </div>
    </section>

    <!-- Links to our working Super Script! -->
    <script src="js/script.js"></script>
</body>
</html>
