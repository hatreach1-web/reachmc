<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ReachMC | Status</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">REACH<span>MC</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a><a href="features.html">Features</a><a href="join.html">Join</a><a href="status.html">Status</a><a href="store.html">Store</a><a href="discord.html">Discord</a>
        </div>
    </nav>

    <section class="discord-container">
        <h2 class="page-title">Live <span style="color:#a020f0">Status</span></h2>
        <div class="discord-card" style="padding: 40px;">
            <div class="status-box" style="transform: scale(1.5); margin: 30px auto;">
                <div class="status-dot" id="status-dot-page"></div>
                <span id="server-status-page">Checking...</span>
            </div>
            <h3 style="margin-top: 20px;">IP: <span style="color: #a020f0;">play.reachmc.fun</span></h3>
            <p id="player-count-page" style="font-size: 1.2rem; margin-top: 10px;"></p>
        </div>
    </section>

    <script>
        // Specific script just for the status page
        async function fetchStatusPage() {
            try {
                const response = await fetch('https://api.mcsrvstat.us/2/play.reachmc.fun');
                const data = await response.json();
                const dot = document.getElementById('status-dot-page');
                const text = document.getElementById('server-status-page');
                const count = document.getElementById('player-count-page');

                if(data.online) {
                    dot.style.background = "#00ff88";
                    dot.style.boxShadow = "0 0 10px #00ff88";
                    text.innerText = "ONLINE";
                    count.innerText = `Currently ${data.players.online} players fighting for survival!`;
                } else {
                    text.innerText = "OFFLINE";
                    dot.style.background = "#ff4b2b";
                    count.innerText = "Server is currently offline.";
                }
            } catch(e) { console.log("Error"); }
        }
        fetchStatusPage();
    </script>
</body>
</html>
